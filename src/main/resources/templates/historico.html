<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Histórico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Histórico de Movimientos</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Usuario</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="mov : ${movimientos}">
            <td th:text="${mov.idMovimiento}"></td>
            <td th:text="${mov.producto.nombre}"></td>
            <td th:text="${mov.usuario.nombre}"></td>
            <td th:text="${mov.tipo}"></td>
            <td th:text="${mov.cantidad}"></td>
            <td th:text="${mov.fechaHora}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/inventario}" class="btn btn-secondary">
        Regresar
    </a>
</div>

</body>
</html>
