<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Grupo Castores</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 text-primary fw-bold">Sistema Castores</h3>

                    <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}"></div>

                    <form th:action="@{/login}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" placeholder="admin o almacen" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="***" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2">Ingresar al Sistema</button>
                    </form>

                    <div class="mt-4 p-2 bg-light rounded text-center" style="font-size: 0.85rem;">
                        <span class="text-muted">Prueba Técnica:</span><br>
                        <strong>admin@empresa.com / 123456</strong> (Administrador)<br>
                        <strong>almacenista@empresa.com / 123456</strong> (Almacenista)
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
